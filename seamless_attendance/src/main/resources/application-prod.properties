server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/seamless_attendance?useSSL=true&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=seamless_attendance_user
spring.datasource.password=123456

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none

mqtt.broker=tcp://127.0.0.1:1883
mqtt.clientId=seamless_attendance_prod
mqtt.subscribe.topic=ESP32C3/status
mqtt.username=emqx_prod
mqtt.password=prod_secure_mqtt_password
mqtt.qos=1

logging.level.tech.xuexinglab.seamless_attendance=WARN
logging.level.org.springframework.web=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/seamless_attendance.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
